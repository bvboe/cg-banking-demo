apiVersion: v1
kind: Namespace
metadata:
  name: __NAMESPACE__
---
apiVersion: v1
kind: Secret
metadata:
  name: banking-secrets
  namespace: __NAMESPACE__
type: Opaque
stringData:
  POSTGRES_USER: banking_user
  POSTGRES_PASSWORD: banking_password
  POSTGRES_DB: banking_db
  DATABASE_URL: postgresql://banking_user:banking_password@banking-postgres:5432/banking_db
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: banking-config
  namespace: __NAMESPACE__
data:
  NEXT_PUBLIC_API_URL: "http://localhost:3000"
  NODE_ENV: "production"
---
# ── Banking Postgres ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: banking-postgres
  namespace: __NAMESPACE__
spec:
  selector:
    app: banking-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: banking-postgres
  namespace: __NAMESPACE__
spec:
  serviceName: banking-postgres
  replicas: 1
  selector:
    matchLabels:
      app: banking-postgres
  template:
    metadata:
      labels:
        app: banking-postgres
    spec:
      volumes:
        - name: postgres-data
          emptyDir: {}
      containers:
        - name: postgres
          image: banking-postgres:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\" -h 127.0.0.1"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\" -h 127.0.0.1"]
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
# ── Banking App ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: banking-app
  namespace: __NAMESPACE__
spec:
  type: NodePort
  selector:
    app: banking-app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-app
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-app
  template:
    metadata:
      labels:
        app: banking-app
    spec:
      containers:
        - name: banking-app
          image: banking-app:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - secretRef:
                name: banking-secrets
            - configMapRef:
                name: banking-config
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - >
                  node -e "const net=require('net');
                  const s=net.connect(5432,'banking-postgres');
                  s.on('connect',()=>{console.log('pg ok'); process.exit(0);});
                  s.on('error',()=>process.exit(1));
                  setTimeout(()=>process.exit(1),1000);"
            failureThreshold: 60
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
---
# ── Banking Worker ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-worker
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-worker
  template:
    metadata:
      labels:
        app: banking-worker
    spec:
      containers:
        - name: banking-worker
          image: banking-worker:v2
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: banking-secrets
            - configMapRef:
                name: banking-config
          command: ["python", "app.py"]
